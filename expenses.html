<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gastos - Simplifica Gestão</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-white via-green-50 to-white text-gray-900 min-h-screen">

  <div id="menu-container"></div>

  <main class="md:ml-72 min-h-screen p-6 md:p-10">
    <div id="mobile-topbar-container"></div>

    <div class="mb-8">
      <h1 class="text-3xl font-bold">Gastos</h1>
      <p class="text-gray-500 mt-1">Gerencie todas as suas despesas em um só lugar.</p>
    </div>

    <!-- filtros -->
    <section class="bg-white rounded-3xl shadow-sm border border-gray-100 p-5 mb-6">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Buscar</label>
          <input id="filter-search" type="text" placeholder="Descrição..." class="w-full rounded-xl border border-gray-200 px-4 py-3 outline-none focus:border-green-500" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Categoria</label>
          <input id="filter-category" type="text" placeholder="Ex: Fornecedor" class="w-full rounded-xl border border-gray-200 px-4 py-3 outline-none focus:border-green-500" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">De</label>
          <input id="filter-date-start" type="date" class="w-full rounded-xl border border-gray-200 px-4 py-3 outline-none focus:border-green-500" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Até</label>
          <input id="filter-date-end" type="date" class="w-full rounded-xl border border-gray-200 px-4 py-3 outline-none focus:border-green-500" />
        </div>
      </div>

      <div class="flex flex-wrap gap-3 mt-4">
        <button id="apply-filters" class="bg-green-600 hover:bg-green-700 text-white font-semibold px-5 py-3 rounded-xl transition">
          Aplicar filtros
        </button>
        <button id="clear-filters" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-5 py-3 rounded-xl transition">
          Limpar
        </button>
      </div>
    </section>

    <!-- resumo -->
    <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-5">
        <p class="text-sm text-gray-500">Total de gastos</p>
        <h2 id="total-expenses-value" class="text-2xl font-bold mt-2">R$ 0,00</h2>
      </div>

      <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-5">
        <p class="text-sm text-gray-500">Quantidade</p>
        <h2 id="total-expenses-count" class="text-2xl font-bold mt-2">0</h2>
      </div>

      <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-5">
        <p class="text-sm text-gray-500">Ticket médio</p>
        <h2 id="average-expense-value" class="text-2xl font-bold mt-2">R$ 0,00</h2>
      </div>
    </section>

    <!-- tabela -->
    <section class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="p-5 border-b border-gray-100 flex items-center justify-between">
        <div>
          <h2 class="text-xl font-bold">Lista de gastos</h2>
          <p class="text-sm text-gray-500">Edite ou exclua qualquer lançamento.</p>
        </div>
      </div>

      <div id="loading" class="p-8 text-center text-gray-500">Carregando gastos...</div>

      <div class="overflow-x-auto hidden" id="table-wrapper">
        <table class="w-full min-w-[900px]">
          <thead class="bg-gray-50">
            <tr class="text-left text-sm text-gray-600">
              <th class="px-5 py-4">Data</th>
              <th class="px-5 py-4">Descrição</th>
              <th class="px-5 py-4">Categoria</th>
              <th class="px-5 py-4">Valor</th>
              <th class="px-5 py-4">Ações</th>
            </tr>
          </thead>
          <tbody id="expenses-tbody"></tbody>
        </table>
      </div>

      <div id="empty-state" class="hidden p-10 text-center text-gray-500">
        Nenhum gasto encontrado.
      </div>
    </section>
  </main>

  <!-- modal editar -->
  <div id="edit-modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl w-full max-w-xl p-6 shadow-2xl">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-bold">Editar gasto</h3>
        <button id="close-edit-modal" class="text-2xl text-gray-400 hover:text-gray-600">×</button>
      </div>

      <form id="edit-form" class="space-y-4">
        <input type="hidden" id="edit-id" />

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Descrição</label>
          <input id="edit-description" type="text" class="w-full rounded-xl border border-gray-200 px-4 py-3 outline-none focus:border-green-500" required />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Categoria</label>
            <input id="edit-category" type="text" class="w-full rounded-xl border border-gray-200 px-4 py-3 outline-none focus:border-green-500" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Valor</label>
            <input id="edit-amount" type="number" step="0.01" class="w-full rounded-xl border border-gray-200 px-4 py-3 outline-none focus:border-green-500" required />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Data</label>
          <input id="edit-date" type="date" class="w-full rounded-xl border border-gray-200 px-4 py-3 outline-none focus:border-green-500" required />
        </div>

        <div class="flex gap-3 pt-2">
          <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-semibold px-5 py-3 rounded-xl transition">
            Salvar alterações
          </button>
          <button type="button" id="cancel-edit" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-5 py-3 rounded-xl transition">
            Cancelar
          </button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { supabase } from './assets/supabase.js'
    import { renderMenu } from './assets/menu.js'

    await renderMenu('Gastos')

    const loading = document.getElementById('loading')
    const tableWrapper = document.getElementById('table-wrapper')
    const tbody = document.getElementById('expenses-tbody')
    const emptyState = document.getElementById('empty-state')

    const totalExpensesValue = document.getElementById('total-expenses-value')
    const totalExpensesCount = document.getElementById('total-expenses-count')
    const averageExpenseValue = document.getElementById('average-expense-value')

    const filterSearch = document.getElementById('filter-search')
    const filterCategory = document.getElementById('filter-category')
    const filterDateStart = document.getElementById('filter-date-start')
    const filterDateEnd = document.getElementById('filter-date-end')
    const applyFiltersBtn = document.getElementById('apply-filters')
    const clearFiltersBtn = document.getElementById('clear-filters')

    const editModal = document.getElementById('edit-modal')
    const closeEditModal = document.getElementById('close-edit-modal')
    const cancelEdit = document.getElementById('cancel-edit')
    const editForm = document.getElementById('edit-form')

    let currentBusinessId = null
    let expenses = []

    function formatCurrency(value) {
      return Number(value || 0).toLocaleString('pt-BR', {
        style: 'currency',
        currency: 'BRL'
      })
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-'
      const [year, month, day] = dateStr.split('-')
      return `${day}/${month}/${year}`
    }

    async function getBusinessId() {
      const { data: { user } } = await supabase.auth.getUser()

      if (!user) {
        window.location.href = 'login.html'
        return null
      }

      const { data: business, error } = await supabase
        .from('businesses')
        .select('id')
        .eq('user_id', user.id)
        .single()

      if (error || !business) {
        alert('Empresa não encontrada.')
        return null
      }

      return business.id
    }

    function updateSummary(items) {
      const total = items.reduce((sum, item) => sum + Number(item.amount || 0), 0)
      const count = items.length
      const avg = count > 0 ? total / count : 0

      totalExpensesValue.textContent = formatCurrency(total)
      totalExpensesCount.textContent = count
      averageExpenseValue.textContent = formatCurrency(avg)
    }

    function renderTable(items) {
      tbody.innerHTML = ''

      if (!items.length) {
        tableWrapper.classList.add('hidden')
        emptyState.classList.remove('hidden')
        return
      }

      emptyState.classList.add('hidden')
      tableWrapper.classList.remove('hidden')

      items.forEach(item => {
        const tr = document.createElement('tr')
        tr.className = 'border-t border-gray-100'

        tr.innerHTML = `
          <td class="px-5 py-4">${formatDate(item.expense_date)}</td>
          <td class="px-5 py-4 font-medium text-gray-900">${item.description || '-'}</td>
          <td class="px-5 py-4 text-gray-600">${item.category || '-'}</td>
          <td class="px-5 py-4 font-semibold text-red-600">${formatCurrency(item.amount)}</td>
          <td class="px-5 py-4">
            <div class="flex gap-2">
              <button data-id="${item.id}" class="edit-btn bg-blue-50 hover:bg-blue-100 text-blue-600 px-4 py-2 rounded-xl font-medium transition">
                Editar
              </button>
              <button data-id="${item.id}" class="delete-btn bg-red-50 hover:bg-red-100 text-red-600 px-4 py-2 rounded-xl font-medium transition">
                Excluir
              </button>
            </div>
          </td>
        `

        tbody.appendChild(tr)
      })

      bindRowActions()
    }

    function applyLocalFilters() {
      const search = filterSearch.value.trim().toLowerCase()
      const category = filterCategory.value.trim().toLowerCase()
      const start = filterDateStart.value
      const end = filterDateEnd.value

      const filtered = expenses.filter(item => {
        const matchesSearch =
          !search ||
          (item.description || '').toLowerCase().includes(search)

        const matchesCategory =
          !category ||
          (item.category || '').toLowerCase().includes(category)

        const itemDate = item.expense_date || ''
        const matchesStart = !start || itemDate >= start
        const matchesEnd = !end || itemDate <= end

        return matchesSearch && matchesCategory && matchesStart && matchesEnd
      })

      updateSummary(filtered)
      renderTable(filtered)
    }

    async function loadExpenses() {
      loading.classList.remove('hidden')
      tableWrapper.classList.add('hidden')
      emptyState.classList.add('hidden')

      const { data, error } = await supabase
        .from('expenses')
        .select('*')
        .eq('business_id', currentBusinessId)
        .order('expense_date', { ascending: false })
        .order('created_at', { ascending: false })

      loading.classList.add('hidden')

      if (error) {
        emptyState.textContent = 'Erro ao carregar gastos.'
        emptyState.classList.remove('hidden')
        return
      }

      expenses = data || []
      updateSummary(expenses)
      renderTable(expenses)
    }

    function openEditModal(item) {
      document.getElementById('edit-id').value = item.id
      document.getElementById('edit-description').value = item.description || ''
      document.getElementById('edit-category').value = item.category || ''
      document.getElementById('edit-amount').value = item.amount || ''
      document.getElementById('edit-date').value = item.expense_date || ''

      editModal.classList.remove('hidden')
      editModal.classList.add('flex')
    }

    function closeModal() {
      editModal.classList.add('hidden')
      editModal.classList.remove('flex')
      editForm.reset()
    }

    function bindRowActions() {
      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id
          const item = expenses.find(exp => String(exp.id) === String(id))
          if (item) openEditModal(item)
        })
      })

      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id
          const confirmed = confirm('Deseja realmente excluir este gasto?')
          if (!confirmed) return

          const { error } = await supabase
            .from('expenses')
            .delete()
            .eq('id', id)
            .eq('business_id', currentBusinessId)

          if (error) {
            alert('Erro ao excluir gasto.')
            return
          }

          await loadExpenses()
          applyLocalFilters()
        })
      })
    }

    editForm.addEventListener('submit', async (e) => {
      e.preventDefault()

      const id = document.getElementById('edit-id').value
      const description = document.getElementById('edit-description').value.trim()
      const category = document.getElementById('edit-category').value.trim()
      const amount = parseFloat(document.getElementById('edit-amount').value || '0')
      const expense_date = document.getElementById('edit-date').value

      const { error } = await supabase
        .from('expenses')
        .update({
          description,
          category,
          amount,
          expense_date
        })
        .eq('id', id)
        .eq('business_id', currentBusinessId)

      if (error) {
        alert('Erro ao atualizar gasto.')
        return
      }

      closeModal()
      await loadExpenses()
      applyLocalFilters()
    })

    closeEditModal.addEventListener('click', closeModal)
    cancelEdit.addEventListener('click', closeModal)
    editModal.addEventListener('click', (e) => {
      if (e.target === editModal) closeModal()
    })

    applyFiltersBtn.addEventListener('click', applyLocalFilters)

    clearFiltersBtn.addEventListener('click', () => {
      filterSearch.value = ''
      filterCategory.value = ''
      filterDateStart.value = ''
      filterDateEnd.value = ''
      updateSummary(expenses)
      renderTable(expenses)
    })

    currentBusinessId = await getBusinessId()
    if (currentBusinessId) {
      await loadExpenses()
    }
  </script>
</body>
</html>
