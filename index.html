<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simplifica Gestão</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-white via-green-50 to-white flex items-center justify-center p-6">

  <div class="w-full max-w-md">

    <!-- LOGO / TÍTULO -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold mb-2">Simplifica Gestão</h1>
      <p class="text-gray-500">Controle simples, lucro claro</p>
    </div>

    <!-- CARD -->
    <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-200">

      <!-- TABS -->
      <div class="flex mb-6 bg-gray-100 rounded-xl p-1">
        <button id="tab-login" class="w-full py-2 rounded-lg font-semibold bg-white shadow">
          Entrar
        </button>
        <button id="tab-register" class="w-full py-2 rounded-lg font-semibold text-gray-500">
          Criar conta
        </button>
      </div>

      <!-- LOGIN -->
      <form id="login-form" class="space-y-4">

        <input id="login-email" type="email" placeholder="Seu email"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-green-600">

        <input id="login-password" type="password" placeholder="Senha"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-green-600">

        <button type="submit"
          class="w-full bg-green-600 text-white py-3 rounded-xl font-semibold hover:bg-green-700 transition">
          Entrar
        </button>
      </form>

      <!-- REGISTER -->
      <form id="register-form" class="space-y-4 hidden">

        <input id="register-name" type="text" placeholder="Seu nome"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-green-600">

        <input id="register-email" type="email" placeholder="Seu email"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-green-600">

        <input id="register-password" type="password" placeholder="Senha"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-green-600">

        <input id="register-business" type="text" placeholder="Nome do seu negócio"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-green-600">

        <button type="submit"
          class="w-full bg-green-600 text-white py-3 rounded-xl font-semibold hover:bg-green-700 transition">
          Criar conta
        </button>
      </form>

    </div>

  </div>

  <!-- SCRIPTS -->
  <script type="module" src="assets/supabase.js"></script>
  <script type="module" src="assets/auth.js"></script>

  <script>
    const loginTab = document.getElementById('tab-login')
    const registerTab = document.getElementById('tab-register')

    const loginForm = document.getElementById('login-form')
    const registerForm = document.getElementById('register-form')

    loginTab.onclick = () => {
      loginForm.classList.remove('hidden')
      registerForm.classList.add('hidden')

      loginTab.classList.add('bg-white', 'shadow')
      registerTab.classList.remove('bg-white', 'shadow')
    }

    registerTab.onclick = () => {
      loginForm.classList.add('hidden')
      registerForm.classList.remove('hidden')

      registerTab.classList.add('bg-white', 'shadow')
      loginTab.classList.remove('bg-white', 'shadow')
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault()

      const email = document.getElementById('login-email').value
      const password = document.getElementById('login-password').value

      await window.signIn(email, password)
    })

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault()

      const name = document.getElementById('register-name').value
      const email = document.getElementById('register-email').value
      const password = document.getElementById('register-password').value
      const business = document.getElementById('register-business').value

      await window.signUp(email, password, name, business)
    })
  </script>

</body>
</html>
