<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simplifica Gestão</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-white via-green-50 to-white flex items-center justify-center p-6">

  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold mb-2">Simplifica Gestão</h1>
      <p class="text-gray-500">Controle simples, lucro claro</p>
    </div>

    <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-200">

      <!-- TABS -->
      <div class="flex mb-6 bg-gray-100 rounded-xl p-1">
        <button type="button" id="tab-login" class="w-full py-2 rounded-lg font-semibold bg-white shadow">
          Entrar
        </button>
        <button type="button" id="tab-register" class="w-full py-2 rounded-lg font-semibold text-gray-500">
          Criar conta
        </button>
      </div>

      <!-- LOGIN -->
      <form id="login-form" class="space-y-4">

        <input id="login-email" type="email" placeholder="Seu email"
          class="w-full border border-gray-300 rounded-xl px-4 py-3">

        <input id="login-password" type="password" placeholder="Senha"
          class="w-full border border-gray-300 rounded-xl px-4 py-3">

        <button type="submit"
          class="w-full bg-green-600 text-white py-3 rounded-xl font-semibold hover:bg-green-700">
          Entrar
        </button>
      </form>

      <!-- REGISTER -->
      <form id="register-form" class="space-y-4 hidden">

        <input id="register-name" type="text" placeholder="Seu nome"
          class="w-full border border-gray-300 rounded-xl px-4 py-3">

        <input id="register-email" type="email" placeholder="Seu email"
          class="w-full border border-gray-300 rounded-xl px-4 py-3">

        <input id="register-password" type="password" placeholder="Senha"
          class="w-full border border-gray-300 rounded-xl px-4 py-3">

        <input id="register-business" type="text" placeholder="Nome do negócio"
          class="w-full border border-gray-300 rounded-xl px-4 py-3">

        <button type="submit"
          class="w-full bg-green-600 text-white py-3 rounded-xl font-semibold hover:bg-green-700">
          Criar conta
        </button>
      </form>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabase = window.supabase.createClient(
      'https://jtcwrrcozunjskuwswmq.supabase.co',
      'sb_publishable_m4XaI4R9Ixr6Kuka4Wz9Pw_jnsavoZU'
    )

    const loginTab = document.getElementById('tab-login')
    const registerTab = document.getElementById('tab-register')

    const loginForm = document.getElementById('login-form')
    const registerForm = document.getElementById('register-form')

    loginTab.onclick = () => {
      loginForm.classList.remove('hidden')
      registerForm.classList.add('hidden')
      loginTab.classList.add('bg-white','shadow')
      registerTab.classList.remove('bg-white','shadow')
    }

    registerTab.onclick = () => {
      loginForm.classList.add('hidden')
      registerForm.classList.remove('hidden')
      registerTab.classList.add('bg-white','shadow')
      loginTab.classList.remove('bg-white','shadow')
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault()

      const email = document.getElementById('login-email').value
      const password = document.getElementById('login-password').value

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password
      })

      if (error) {
        alert(error.message)
        return
      }

      window.location.href = 'dashboard.html'
    })

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault()

      const nome = document.getElementById('register-name').value
      const email = document.getElementById('register-email').value
      const password = document.getElementById('register-password').value
      const empresa = document.getElementById('register-business').value

      const { data, error } = await supabase.auth.signUp({
        email,
        password
      })

      if (error) {
        alert(error.message)
        return
      }

      const user = data.user

      await supabase.from('profiles').insert({
        id: user.id,
        nome,
        email
      })

      await supabase.from('businesses').insert({
        owner_user_id: user.id,
        nome: empresa
      })

      alert('Conta criada! Agora faça login.')
      window.location.reload()
    })
  </script>

</body>
</html>
